[workspace]
authors = ["essmaw <essmay.touami@etu.u-paris.fr>", "KarinDuong <karine.duong@univ-evry.fr>"]
channels = ["conda-forge"]
name = "IA-BioSoftware-Workshop"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = ">=3.14.6,<3.15"
pandas = ">=3.0.3,<4"
requests = ">=2.34.2,<3"

[feature.dev.dependencies]
ruff = "*"
pyright = "*"
pytest = "*"
pytest-cov = "*"
safety = "*"
trivy = "*"

[environments]
default = { features = ["default"] }
dev = { features = ["default", "dev"] }
